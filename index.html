<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Search Pro</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#f4f6f9;
}

#grid{
    display:grid;
    grid-template-columns: repeat(10,40px);
    gap:3px;
    justify-content:center;
    margin-top:20px;
}

.cell{
    width:40px;
    height:40px;
    background:white;
    border:1px solid #ccc;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
    cursor:pointer;
    user-select:none;
}

.cell.selected{
    background:#2196F3; /* 🔵 biru saat ditekan */
    color:white;
}

.cell.found{
    background:#E53935; /* 🔴 merah saat benar */
    color:white;
}

#clueBox{
    margin-top:25px;
}

#clueBox ul{
    list-style:none;
    padding:0;
}

#clueBox li{
    margin:5px 0;
    font-weight:bold;
}

.foundWord{
    text-decoration: line-through;
    color:#E53935;
}
</style>
</head>
<body>

<h1>Word Search Challenge 🔥</h1>
<p>Temukan kata berdasarkan clue di bawah!</p>

<div id="grid"></div>

<div id="clueBox">
    <h3>Clue:</h3>
    <ul id="wordList"></ul>
</div>

<script>

const words = [
    {word:"SUNNY", clue:"Cuaca cerah"},
    {word:"RAINY", clue:"Cuaca hujan"},
    {word:"WINDY", clue:"Banyak angin"},
    {word:"CLOUDY", clue:"Berawan"},
    {word:"HOT", clue:"Panas"},
    {word:"COLD", clue:"Dingin"},
    {word:"SNOWY", clue:"Bersalju"},
    {word:"FOGGY", clue:"Berkabut"},
    {word:"STORMY", clue:"Badai"}
];

const gridSize = 10;
const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

let gridArray = [];
let selectedCells = [];
let foundWords = [];

const grid = document.getElementById("grid");
const wordList = document.getElementById("wordList");

function createEmptyGrid(){
    for(let i=0;i<gridSize;i++){
        gridArray[i]=[];
        for(let j=0;j<gridSize;j++){
            gridArray[i][j]="";
        }
    }
}

function placeWord(word){
    let placed=false;

    const directions = [
        {x:0,y:1},
        {x:1,y:0},
        {x:1,y:1},
        {x:-1,y:1}
    ];

    while(!placed){
        let dir = directions[Math.floor(Math.random()*directions.length)];
        let row = Math.floor(Math.random()*gridSize);
        let col = Math.floor(Math.random()*gridSize);

        let canPlace=true;

        for(let i=0;i<word.length;i++){
            let newRow = row + dir.x*i;
            let newCol = col + dir.y*i;

            if(
                newRow<0 || newRow>=gridSize ||
                newCol<0 || newCol>=gridSize ||
                (gridArray[newRow][newCol]!=="" &&
                 gridArray[newRow][newCol]!==word[i])
            ){
                canPlace=false;
                break;
            }
        }

        if(canPlace){
            for(let i=0;i<word.length;i++){
                let newRow = row + dir.x*i;
                let newCol = col + dir.y*i;
                gridArray[newRow][newCol]=word[i];
            }
            placed=true;
        }
    }
}

function fillRandomLetters(){
    for(let i=0;i<gridSize;i++){
        for(let j=0;j<gridSize;j++){
            if(gridArray[i][j]===""){
                gridArray[i][j]=letters[Math.floor(Math.random()*letters.length)];
            }
        }
    }
}

function renderGrid(){
    for(let i=0;i<gridSize;i++){
        for(let j=0;j<gridSize;j++){
            const cell=document.createElement("div");
            cell.classList.add("cell");
            cell.textContent=gridArray[i][j];
            cell.dataset.row=i;
            cell.dataset.col=j;
            cell.addEventListener("click",()=>selectCell(cell));
            grid.appendChild(cell);
        }
    }
}

function renderClues(){
    words.forEach(w=>{
        const li=document.createElement("li");
        li.id=w.word;
        li.textContent=`${w.word} - ${w.clue}`;
        wordList.appendChild(li);
    });
}

function isStraightLine(cells){
    if(cells.length < 2) return true;

    let r1 = parseInt(cells[0].dataset.row);
    let c1 = parseInt(cells[0].dataset.col);
    let r2 = parseInt(cells[1].dataset.row);
    let c2 = parseInt(cells[1].dataset.col);

    let rowDiff = r2 - r1;
    let colDiff = c2 - c1;

    return (
        rowDiff === 0 ||
        colDiff === 0 ||
        Math.abs(rowDiff) === Math.abs(colDiff)
    );
}

function selectCell(cell){

    if(cell.classList.contains("found")) return;

    if(selectedCells.length >= 2){
        let temp = [...selectedCells, cell];
        if(!isStraightLine(temp)) return;
    }

    cell.classList.add("selected");
    selectedCells.push(cell);

    let selectedWord = selectedCells.map(c=>c.textContent).join("");
    let reversedWord = selectedWord.split("").reverse().join("");

    let matchedWord = words.find(w=> 
        w.word === selectedWord || w.word === reversedWord
    );

    if(matchedWord){
        selectedCells.forEach(c=>{
            c.classList.remove("selected");
            c.classList.add("found");
        });

        document.getElementById(matchedWord.word)
            .classList.add("foundWord");

        foundWords.push(matchedWord.word);
        selectedCells=[];
    }

    if(foundWords.length===words.length){
        setTimeout(()=>{
            alert("🎉 Semua kata ditemukan!");
        },500);
    }
}

createEmptyGrid();
words.forEach(w=>placeWord(w.word));
fillRandomLetters();
renderGrid();
renderClues();

</script>

</body>
</html>
